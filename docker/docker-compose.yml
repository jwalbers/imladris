# Imladris — Virtual Integration Lab
# Two-Orthanc smoke-test stack
#
# Default (no profile): modality simulator + cloud PACS only.
# Add --profile full to also start the modality sidecar (requires OpenMRS MWL).
#
# Quick start:
#   docker compose up -d
#   open http://localhost:8042   # modality (AE: MODALITY_SIM)
#   open http://localhost:8043   # cloud PACS (AE: CLOUD_PACS)
#   open http://localhost:8044   # PACS DICOMweb CORS proxy (used by OHIF)
#   open http://localhost:3000   # OHIF viewer
#
# Upload a study to the modality:
#   curl -u admin:admin -X POST http://localhost:8042/instances \
#        --data-binary @some_file.dcm
#
# Push it to the PACS:
#   curl -u admin:admin -X POST http://localhost:8042/modalities/CLOUD_PACS/store \
#        -d '["<study-uid>"]'

services:
  # -- MySQL -----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: imladris-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: openmrs
      MYSQL_USER: openmrs
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-openmrs}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/openmrs.cnf:/etc/mysql/conf.d/openmrs.cnf:ro
    networks:
      - imladris

  # ── Modality simulator ──────────────────────────────────────────────
  orthanc-modality:
    image: orthancteam/orthanc:latest
    container_name: imladris-modality
    restart: unless-stopped
    ports:
      - "4242:4242"   # DICOM C-STORE / C-FIND / MWL C-FIND
      - "8042:8042"   # REST API + web UI
    volumes:
      - ./orthanc/modality.json:/etc/orthanc/orthanc.json:ro
      - modality-data:/var/lib/orthanc/db
      - worklist-data:/worklist   # shared with sidecar for MWL .wl files
    networks:
      - imladris

  # ── Cloud PACS ──────────────────────────────────────────────────────
  orthanc-pacs:
    image: orthancteam/orthanc:latest
    container_name: imladris-pacs
    restart: unless-stopped
    ports:
      - "4243:4242"   # DICOM C-STORE
      - "8043:8042"   # REST API + web UI
    volumes:
      - ./orthanc/pacs.json:/etc/orthanc/orthanc.json:ro
      - pacs-data:/var/lib/orthanc/db
    networks:
      - imladris

  # ── nginx CORS proxy for PACS (required by OHIF) ───────────────────
  pacs-proxy:
    image: nginx:alpine
    container_name: imladris-pacs-proxy
    restart: unless-stopped
    ports:
      - "8044:8044"   # PACS DICOMweb endpoint with CORS headers
    volumes:
      - ./nginx/pacs-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - orthanc-pacs
    networks:
      - imladris

  # ── OHIF Viewer (radiologist workstation) ──────────────────────────
  ohif:
    image: ohif/app:latest
    container_name: imladris-ohif
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./ohif/app-config.js:/usr/share/nginx/html/app-config.js:ro
    depends_on:
      - pacs-proxy
    networks:
      - imladris

  # ── Modality sidecar (HL7 bridge + MWL poller) — requires OpenMRS ──
  modality-sidecar:
    build: ../sidecar
    container_name: imladris-sidecar
    restart: unless-stopped
    depends_on:
      - orthanc-modality
      - orthanc-pacs
    ports:
      - "2575:2575"   # MLLP HL7 listener (OpenMRS sends orders here)
    volumes:
      - worklist-data:/worklist   # shared with orthanc-modality for .wl files
      - sidecar-data:/data        # order poller state (last-polled timestamp)
    environment:
      # Acquisition loop
      ORTHANC_URL: http://orthanc-modality:8042
      MWL_HOST: orthanc-modality        # now served by Orthanc modality itself
      MWL_PORT: 4242
      MODALITY_AET: MODALITY_SIM
      CLOUD_PACS_AE: CLOUD_PACS
      POLL_INTERVAL_MINUTES: 5
      # Order poller (OpenMRS REST → MWL)
      OPENMRS_URL: http://openmrs:8080/openmrs
      OPENMRS_USER: admin
      OPENMRS_PASSWORD: Admin123
      ORDER_POLL_SEC: 30
      ORDER_STATE_FILE: /data/order_poller_state.json
      # RADIOLOGY_ORDER_TYPE_UUID: ""   # leave blank to auto-discover
      # PACS change watcher (ORU^R01 back to OpenMRS)
      OPENMRS_HL7_HOST: openmrs
      OPENMRS_HL7_PORT: 8066
      PACS_URL: http://orthanc-pacs:8042
      PACS_USER: admin
      PACS_PASSWORD: admin
      WL_FOLDER: /worklist
      CHANGE_POLL_SEC: 15
    networks:
      - imladris
    profiles:
      - full   # only starts with: docker compose --profile full up

volumes:
  mysql-data:
  modality-data:
  pacs-data:
  worklist-data:    # DICOM .wl files shared between sidecar and orthanc-modality
  sidecar-data:     # order poller persistent state

networks:
  imladris:
    driver: bridge
